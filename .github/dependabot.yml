version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: Europe/Warsaw
    open-pull-requests-limit: 2
    versioning-strategy: increase
    rebase-strategy: auto
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 3
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    labels:
      - dependencies
      - automated
    groups:
      trpc-stack:
        patterns:
          - '@trpc/*'
          - '@tanstack/react-query'
        update-types:
          - minor
          - patch
      eslint-stack:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - 'prettier'
          - 'prettier-*'
          - '@typescript-eslint/*'
        update-types:
          - minor
          - patch
      stylelint-stack:
        patterns:
          - 'stylelint'
          - 'stylelint-*'
        update-types:
          - minor
          - patch
      jest-stack:
        patterns:
          - 'jest'
          - 'jest-*'
          - 'ts-jest'
        update-types:
          - minor
          - patch
      vitest-stack:
        patterns:
          - 'vitest'
          - 'vitest-*'
          - '@vitest/*'
        update-types:
          - minor
          - patch
      msw-stack:
        patterns:
          - 'msw'
          - 'msw-*'
          - 'openapi-msw'
          - '@mswjs/*'
        update-types:
          - minor
          - patch
      testing-library-stack:
        patterns:
          - '@testing-library/*'
        update-types:
          - minor
          - patch
      playwright-stack:
        patterns:
          - '@playwright/*'
          - 'playwright-*'
        update-types:
          - minor
          - patch
      commitlint-stack:
        patterns:
          - '@commitlint/*'
        update-types:
          - minor
          - patch
