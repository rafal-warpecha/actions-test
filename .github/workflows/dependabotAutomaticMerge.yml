name: Dependabot auto-merge

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only proceed when Tests passed
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Find open PR for this commit
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          DATA=$(gh api "repos/$REPO/pulls?state=open" \
            --jq ".[] | select(.head.sha == \"$SHA\") | {number: .number, actor: .user.login}" \
            | head -1)
          echo "number=$(echo $DATA | jq -r '.number // empty')" >> $GITHUB_OUTPUT
          echo "actor=$(echo $DATA | jq -r '.actor // empty')" >> $GITHUB_OUTPUT

      - name: Fetch Dependabot metadata
        id: meta
        if: steps.pr.outputs.actor == 'dependabot[bot]'
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ steps.pr.outputs.number }}
          sha: ${{ github.event.workflow_run.head_sha }}

      - name: Merge patch update with admin bypass
        if: |
          steps.pr.outputs.actor == 'dependabot[bot]' &&
          steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge ${{ steps.pr.outputs.number }} --squash --admin
        env:
          GH_TOKEN: ${{ secrets.GH_API_TOKEN }}
